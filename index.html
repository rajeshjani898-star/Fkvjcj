<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Smart Scan – Photo to PDF</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06091A;--bg2:#090E20;
  --glass:rgba(255,255,255,0.055);
  --glass-b:rgba(0,180,255,0.13);
  --glass-s:rgba(255,255,255,0.10);
  --acc:#00AAFF;--acc2:#0055FF;
  --acc-glow:rgba(0,170,255,0.28);
  --txt:#E6F4FF;--txt2:rgba(230,244,255,0.58);--txt3:rgba(230,244,255,0.32);
  --red:#FF4757;--grn:#2ED573;--ylw:#FFA502;
  --r:20px;--rs:12px;
}
.lm{
  --bg:#ECF3FF;--bg2:#DDE9FF;
  --glass:rgba(255,255,255,0.72);
  --glass-b:rgba(0,100,255,0.18);
  --glass-s:rgba(255,255,255,0.92);
  --acc-glow:rgba(0,100,255,0.12);
  --txt:#0A1628;--txt2:rgba(10,22,40,0.65);--txt3:rgba(10,22,40,0.38);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:14px}

/* ── BG ORBS ── */
.orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.13;animation:ofloat 9s ease-in-out infinite alternate}
.o1{width:320px;height:320px;background:#0055FF;top:-120px;right:-60px;animation-delay:0s}
.o2{width:220px;height:220px;background:#00AAFF;bottom:80px;left:-80px;animation-delay:-3.5s}
.o3{width:160px;height:160px;background:#003ECC;top:42%;right:-20px;animation-delay:-6s}
@keyframes ofloat{from{transform:translate(0,0)scale(1)}to{transform:translate(18px,28px)scale(1.12)}}
.lm .orbs .orb{opacity:.06}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:1000;
  background:linear-gradient(150deg,#04080F,#060C1C,#080E22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .75s ease,transform .75s ease}
#splash.gone{opacity:0;transform:scale(1.04);pointer-events:none}
.sp-logo{width:96px;height:96px;border-radius:26px;font-size:46px;
  background:linear-gradient(135deg,#0055FF,#00AAFF);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 50px rgba(0,170,255,.4),0 0 100px rgba(0,85,255,.2);
  animation:popIn .9s cubic-bezier(.34,1.56,.64,1) both;margin-bottom:22px}
.sp-title{font-family:'Exo 2',sans-serif;font-size:27px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(90deg,#00AAFF,#fff 50%,#0055FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:slideUp .9s .25s ease both}
.sp-sub{color:rgba(255,255,255,.35);font-size:12px;margin-top:6px;animation:slideUp .9s .4s ease both}
.sp-bar{width:110px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:44px;overflow:hidden;animation:slideUp .9s .5s ease both}
.sp-fill{height:100%;background:linear-gradient(90deg,#0055FF,#00AAFF);border-radius:3px;animation:fillBar 2.4s .7s ease forwards}
@keyframes popIn{from{transform:scale(0)rotate(-18deg);opacity:0}to{transform:scale(1)rotate(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fillBar{0%{width:0}70%{width:85%}100%{width:100%}}

/* ── APP ── */
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;
  padding-bottom:68px;animation:scrIn .32s ease both}
.screen.active{display:flex}
.screen.nonav{padding-bottom:0}
@keyframes scrIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}

/* ── HEADER ── */
.hdr{padding:14px 18px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:linear-gradient(to bottom,rgba(6,9,26,.92) 80%,transparent);z-index:10}
.hbk,.hact{width:40px;height:40px;border-radius:12px;background:var(--glass);
  border:1px solid var(--glass-b);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
  transition:.18s;flex-shrink:0}
.hbk:active,.hact:active{transform:scale(.91)}
.htitle{font-family:'Exo 2',sans-serif;font-size:19px;font-weight:700;flex:1}
.hact.prim{background:linear-gradient(135deg,#0055FF,#00AAFF);border:none;color:#fff}

/* ── SCROLL ── */
.sa{flex:1;overflow-y:auto;padding:0 15px 16px;-webkit-overflow-scrolling:touch}
.sa::-webkit-scrollbar{display:none}

/* ── GLASS CARD ── */
.gc{background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-radius:var(--r);padding:18px;transition:.25s}
.gc-sm{background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:blur(22px);border-radius:var(--rs);padding:13px}

/* ── BTNS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border-radius:14px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  transition:.18s;user-select:none}
.btn:active{transform:scale(.95)}
.btn-p{background:linear-gradient(135deg,#0055FF,#00AAFF);color:#fff;
  box-shadow:0 4px 18px rgba(0,170,255,.33)}
.btn-g{background:var(--glass);color:var(--txt);border:1px solid var(--glass-b);backdrop-filter:blur(12px)}
.btn-s{background:linear-gradient(135deg,#00B84A,#2ED573);color:#fff;
  box-shadow:0 4px 18px rgba(46,213,115,.28)}
.btn-d{background:rgba(255,71,87,.14);color:var(--red);border:1px solid rgba(255,71,87,.28)}
.btn-w{width:100%}

/* ── HOME ── */
.hero{margin:6px 0 18px;background:linear-gradient(135deg,rgba(0,85,255,.14),rgba(0,170,255,.07));
  border:1px solid rgba(0,170,255,.18);border-radius:24px;padding:22px;
  backdrop-filter:blur(22px);text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 75% 25%,rgba(0,170,255,.09),transparent 62%);pointer-events:none}
.hero-ico{font-size:44px;margin-bottom:10px}
.hero h2{font-family:'Exo 2',sans-serif;font-size:21px;font-weight:800;
  background:linear-gradient(90deg,#00AAFF,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.hero p{color:var(--txt2);font-size:12px;line-height:1.55}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,170,255,.14);
  border:1px solid rgba(0,170,255,.28);border-radius:20px;
  padding:4px 12px;font-size:12px;font-weight:600;color:var(--acc);margin-top:14px}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.qb{background:var(--glass);border:1px solid var(--glass-b);backdrop-filter:blur(22px);
  border-radius:20px;padding:18px 14px;text-align:center;cursor:pointer;
  transition:.22s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:9px}
.qb:active{transform:scale(.94);background:var(--glass-s)}
.qi{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:23px}
.qi.bl{background:rgba(0,85,255,.12);border:1px solid rgba(0,170,255,.22)}
.qi.pu{background:rgba(139,92,246,.12);border:1px solid rgba(167,139,250,.22)}
.qi.gr{background:rgba(0,200,83,.12);border:1px solid rgba(46,213,115,.22)}
.qi.or{background:rgba(255,107,0,.12);border:1px solid rgba(255,165,2,.22)}
.ql{font-size:12px;font-weight:600;color:var(--txt2)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.sec-t{font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700}
.sec-l{color:var(--acc);font-size:12px;cursor:pointer}
.pps{display:flex;gap:9px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.pps::-webkit-scrollbar{display:none}
.ppi{flex-shrink:0;width:68px;cursor:pointer;position:relative}
.ppi img{width:68px;height:88px;object-fit:cover;border-radius:8px;border:2px solid transparent;transition:.2s}
.ppi.active img{border-color:var(--acc);box-shadow:0 0 10px var(--acc-glow)}
.ppn{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.72);color:#fff;
  font-size:9px;font-weight:700;border-radius:4px;padding:1px 4px}
.pdel{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
  background:var(--red);color:#fff;font-size:12px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.35)}
@keyframes pulse{0%,100%{box-shadow:0 4px 18px rgba(0,170,255,.33)}50%{box-shadow:0 4px 28px rgba(0,170,255,.6)}}
.pulse-btn{animation:pulse 2.2s ease-in-out infinite}

/* ── CAMERA ── */
#scr-cam{background:#000;padding-bottom:0}
#camvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.camov{position:absolute;inset:0;display:flex;flex-direction:column}
.camtop{padding:14px 18px 0;display:flex;justify-content:space-between;align-items:center;z-index:10}
.camfr{flex:1;display:flex;align-items:center;justify-content:center}
.docfr{width:78%;height:60%;border:2px solid rgba(0,170,255,.85);border-radius:8px;position:relative;
  box-shadow:0 0 0 2000px rgba(0,0,0,.38)}
.dfc{position:absolute;width:20px;height:20px;border-color:var(--acc);border-style:solid}
.dfc.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.dfc.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.dfc.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.dfc.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scanline{position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  box-shadow:0 0 10px var(--acc);animation:scanA 2.6s ease-in-out infinite}
@keyframes scanA{0%,100%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}50%{top:100%}}
.cambot{padding:22px 30px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.82),transparent);z-index:10}
.cib{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.16);
  backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;border:none;color:#fff;transition:.18s}
.ccb{width:74px;height:74px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.28);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(255,255,255,.1);transition:.14s}
.ccb:active{transform:scale(.91)}
.cci{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0055FF,#00AAFF)}

/* ── EDIT ── */
.ecw{margin:0 15px;border-radius:var(--r);overflow:hidden;position:relative;background:#111;flex-shrink:0}
#editcvs{width:100%;display:block;cursor:crosshair}
.ch{position:absolute;width:26px;height:26px;border-radius:7px;background:var(--acc);
  cursor:grab;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.5);transition:.12s;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.ch:active{transform:scale(1.25);cursor:grabbing}
.fstrip{display:flex;gap:9px;padding:12px 15px;overflow-x:auto;flex-shrink:0}
.fstrip::-webkit-scrollbar{display:none}
.ft{flex-shrink:0;width:62px;text-align:center;cursor:pointer}
.fti{width:62px;height:62px;border-radius:12px;background:var(--glass);
  border:2px solid transparent;overflow:hidden;margin-bottom:4px;
  transition:.2s;display:flex;align-items:center;justify-content:center;font-size:22px}
.ft.act .fti{border-color:var(--acc);box-shadow:0 0 12px var(--acc-glow)}
.ftl{font-size:10px;color:var(--txt2)}
.tbar{display:flex;gap:9px;padding:0 15px 11px;overflow-x:auto;flex-shrink:0}
.tbar::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;background:var(--glass);border:1px solid var(--glass-b);
  border-radius:12px;padding:9px 15px;display:flex;align-items:center;gap:7px;
  font-size:12px;color:var(--txt);cursor:pointer;backdrop-filter:blur(12px);
  transition:.18s;white-space:nowrap}
.tb:active{background:var(--glass-s)}
.tb.act{border-color:var(--acc);color:var(--acc);background:rgba(0,170,255,.1)}

/* ── SIGNATURE ── */
#sigcvs{width:100%;border-radius:var(--r);background:rgba(255,255,255,.04);
  border:1px dashed var(--glass-b);touch-action:none;cursor:crosshair;display:block}

/* ── REORDER ── */
.plist{display:flex;flex-direction:column;gap:11px}
.pitem{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--rs);
  padding:11px;display:flex;align-items:center;gap:11px;backdrop-filter:blur(22px);
  transition:.2s;user-select:none}
.pitem.dragging{opacity:.45;transform:scale(.97)}
.pitem.over{border-color:var(--acc);background:rgba(0,170,255,.08)}
.pthumb{width:48px;height:62px;border-radius:8px;background:#111;overflow:hidden;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover}
.pinfo{flex:1}.pname{font-size:13px;font-weight:600}
.psub{font-size:11px;color:var(--txt3);margin-top:2px}
.dh{color:var(--txt3);font-size:20px;cursor:grab;padding:4px}

/* ── PDF SETTINGS ── */
.srow{display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--glass-b)}
.srow:last-child{border-bottom:none}
.slab{display:flex;align-items:center;gap:9px}
.slt{font-size:14px;font-weight:500}
.slsub{font-size:11px;color:var(--txt3);margin-top:2px}
.qopts{display:flex;gap:7px}
.qbtn{padding:7px 13px;border-radius:10px;font-size:12px;font-weight:600;
  border:1px solid var(--glass-b);background:var(--glass);color:var(--txt2);cursor:pointer;transition:.18s}
.qbtn.act{background:rgba(0,170,255,.14);border-color:var(--acc);color:var(--acc)}
.tog{width:46px;height:24px;border-radius:12px;background:rgba(255,255,255,.14);
  position:relative;cursor:pointer;transition:.28s;flex-shrink:0}
.tog.on{background:linear-gradient(135deg,#0055FF,#00AAFF)}
.togth{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:.28s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on .togth{left:25px}
.ginp{width:100%;padding:11px 15px;border-radius:12px;background:var(--glass);
  border:1px solid var(--glass-b);color:var(--txt);font-family:'DM Sans',sans-serif;
  font-size:14px;outline:none;backdrop-filter:blur(12px);transition:.2s}
.ginp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow)}
.ginp::placeholder{color:var(--txt3)}
.pbar{height:4px;background:rgba(255,255,255,.09);border-radius:2px;overflow:hidden;margin:7px 0}
.pbfill{height:100%;background:linear-gradient(90deg,#0055FF,#00AAFF);border-radius:2px;transition:width .35s ease}

/* ── HISTORY ── */
.hitem{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--rs);
  padding:13px;display:flex;align-items:center;gap:13px;margin-bottom:9px;
  backdrop-filter:blur(22px);cursor:pointer;transition:.2s}
.hitem:active{background:var(--glass-s)}
.hthumb{width:42px;height:54px;border-radius:8px;background:linear-gradient(135deg,rgba(0,85,255,.14),rgba(0,170,255,.08));
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  border:1px solid var(--glass-b)}
.hinfo{flex:1;min-width:0}
.hname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hmeta{font-size:11px;color:var(--txt3);margin-top:3px}
.hacts{display:flex;gap:7px}
.hab{width:33px;height:33px;border-radius:10px;background:var(--glass);
  border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;transition:.18s}
.hab:active{transform:scale(.88)}

/* ── SETTINGS ── */
.sstitle{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;
  letter-spacing:1.4px;margin-bottom:9px;padding:0 3px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:68px;display:flex;
  background:rgba(6,9,26,.88);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-top:1px solid var(--glass-b);padding-bottom:6px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;transition:.18s;padding-top:7px;color:var(--txt3);
  font-size:10px;font-weight:600}
.nb.on{color:var(--acc)}
.ni{font-size:21px;transition:.18s}
.nb.on .ni{filter:drop-shadow(0 0 6px var(--acc))}
.lm .bnav{background:rgba(220,235,255,.88);border-top-color:rgba(0,100,255,.14)}

/* ── MODAL ── */
.mover{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.68);
  backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center}
.mover.vis{display:flex}
.msheet{width:100%;max-width:480px;border-radius:26px 26px 0 0;
  background:rgba(7,12,26,.97);border-top:1px solid var(--glass-b);
  backdrop-filter:blur(40px);padding:18px 18px 34px;
  animation:sheetup .32s cubic-bezier(.34,1.1,.64,1) both}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:0 auto 18px}
.mtitle{font-family:'Exo 2',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px}

/* ── TOAST ── */
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%)translateY(-18px);
  z-index:999;background:rgba(7,12,26,.92);border:1px solid var(--glass-b);
  border-radius:14px;padding:11px 18px;display:flex;align-items:center;gap:9px;
  font-size:13px;font-weight:500;backdrop-filter:blur(22px);pointer-events:none;
  opacity:0;transition:.3s;max-width:calc(100% - 36px);white-space:nowrap}
.toast.vis{opacity:1;transform:translateX(-50%)translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 18px}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty-t{font-family:'Exo 2',sans-serif;font-size:17px;font-weight:700;margin-bottom:7px}
.empty-s{color:var(--txt2);font-size:12px;line-height:1.6}

/* watermark preview */
#wmPrev{width:100%;height:110px;border-radius:12px;background:rgba(255,255,255,.04);
  border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:rgba(0,170,255,.38);margin-top:11px;
  letter-spacing:2px;text-transform:uppercase;pointer-events:none;
  font-family:'Exo 2',sans-serif}
.divider{height:1px;background:var(--glass-b);margin:14px 0}
</style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">📄</div>
  <div class="sp-title">Smart Scan</div>
  <div class="sp-sub">Photo to PDF · Premium Edition</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- APP -->
<div id="app">

<!-- ═══ HOME ═══ -->
<div id="scr-home" class="screen active">
  <div class="hdr">
    <div style="flex:1">
      <div style="font-size:11px;color:var(--txt3);margin-bottom:2px">Offline Ready ✅</div>
      <div style="font-family:'Exo 2',sans-serif;font-size:21px;font-weight:800">Smart Scan 📄</div>
    </div>
    <div class="hact" id="themeBtn" onclick="toggleTheme()">🌙</div>
    <div class="hact" onclick="nav('scr-settings','nb-cfg')" style="margin-left:7px">⚙️</div>
  </div>
  <div class="sa">
    <div class="hero gc">
